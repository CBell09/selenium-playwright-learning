name: Test Reports — GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test-selenium-basic:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: selenium-basic
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: temurin
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Run tests
        run: ./gradlew test --info
        continue-on-error: true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: allure-results-selenium-basic
          path: selenium-basic/build/allure-results
          if-no-files-found: warn

  test-selenium-advanced:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: selenium-advanced
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '11'
          distribution: temurin
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Run tests
        run: ./gradlew test --info
        continue-on-error: true
        env:
          BROWSER: CHROME
          TESTHOST: GRADLE
          SEL_LOG_LEVEL: INFO
          TAGS: TESTS
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: allure-results-selenium-advanced
          path: selenium-advanced/build/allure-results
          if-no-files-found: warn

  test-playwright:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: playwright-typescript
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run tests
        run: npx playwright test
        continue-on-error: true
        env:
          TESTURL: https://playwright.dev
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: allure-results-playwright
          path: playwright-typescript/allure-results
          if-no-files-found: warn

  deploy:
    needs: [test-selenium-basic, test-selenium-advanced, test-playwright]
    if: always()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: all-results
      - name: Install Allure CLI
        run: npm install -g allure-commandline
      - name: Generate Allure reports
        run: |
          [ -d all-results/allure-results-selenium-basic ]   && allure generate all-results/allure-results-selenium-basic   --clean -o site/selenium-basic   || mkdir -p site/selenium-basic
          [ -d all-results/allure-results-selenium-advanced ] && allure generate all-results/allure-results-selenium-advanced --clean -o site/selenium-advanced || mkdir -p site/selenium-advanced
          [ -d all-results/allure-results-playwright ]        && allure generate all-results/allure-results-playwright        --clean -o site/playwright-ts      || mkdir -p site/playwright-ts
      - name: Create index page
        run: |
          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Test Reports — selenium-playwright-learning</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 860px; margin: 60px auto; padding: 0 24px; color: #24292e; }
              h1 { font-size: 1.8rem; border-bottom: 1px solid #e1e4e8; padding-bottom: 12px; margin-bottom: 8px; }
              .subtitle { color: #586069; margin: 0 0 36px; }
              .subtitle a { color: #0366d6; }
              .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
              .card { border: 1px solid #e1e4e8; border-radius: 8px; padding: 20px 24px; text-decoration: none; color: inherit; display: block; transition: box-shadow .15s; }
              .card:hover { box-shadow: 0 3px 12px rgba(0,0,0,.1); border-color: #0366d6; }
              .card h2 { margin: 0 0 6px; font-size: 1.05rem; color: #0366d6; }
              .card p { margin: 0; font-size: .875rem; color: #586069; line-height: 1.5; }
              .tag { display: inline-block; background: #f1f8ff; color: #0366d6; border-radius: 3px; padding: 1px 6px; font-size: .75rem; margin-right: 4px; }
            </style>
          </head>
          <body>
            <h1>Test Reports</h1>
            <p class="subtitle">
              Allure reports for <a href="https://github.com/CBell09/selenium-playwright-learning">selenium-playwright-learning</a>.
              Updated on every push to <code>main</code>.
            </p>
            <div class="grid">
              <a class="card" href="selenium-basic/">
                <h2>Selenium Basic</h2>
                <p><span class="tag">Java</span><span class="tag">Selenium 4.33</span></p>
                <p>Direct ChromeDriver setup, single test — the starting point.</p>
              </a>
              <a class="card" href="selenium-advanced/">
                <h2>Selenium Advanced</h2>
                <p><span class="tag">Java</span><span class="tag">Selenium 4.33</span></p>
                <p>Base class pattern, multi-browser, Docker Grid, JUnit tags, parallel execution.</p>
              </a>
              <a class="card" href="playwright-ts/">
                <h2>Playwright TypeScript</h2>
                <p><span class="tag">TypeScript</span><span class="tag">Playwright 1.59</span></p>
                <p>Multi-browser, env-driven URLs, trace and video on failure.</p>
              </a>
            </div>
          </body>
          </html>
          EOF
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
