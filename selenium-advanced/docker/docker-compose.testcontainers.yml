# Add the `-d` flag at the end for detached execution
# To stop the execution, hit Ctrl+C, and then `docker-compose -f docker-compose-v3-dev.yml down`
version: "3.9"

#networks:
#  selenium-network:
#    name: selenium-network
#    attachable: true
#    ipam:
#      driver: default
#      config:
#        - subnet: 172.28.0.0/16
#          ip_range: 172.28.5.0/24
#          gateway: 172.28.0.1

services:
  chrome-intel:
    image: selenium/node-chrome
    env_file:
      - .env
    shm_size: 2gb
    volumes:
      - /dev/shm:/dev/shm
    depends_on:
      - selenium-hub-intel
#    networks:
#      - selenium-network
    ports:
      - "5901:5900"
      - "7901:7900"
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub-intel
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_GRID_URL=http://selenium-hub-intel:4444
      - SE_VNC_PASSWORD=$SE_VNC_PASSWORD
      - SE_SCREEN_WIDTH=1920 #default 1360
      - SE_SCREEN_HEIGHT=1080 #default 1020

  edge-intel:
    image: selenium/node-edge
    shm_size: 2gb
    depends_on:
      - selenium-hub-intel
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub-intel
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_GRID_URL=http://selenium-hub-intel:4444
      - SE_VNC_PASSWORD=$SE_VNC_PASSWORD
      - SE_SCREEN_WIDTH=1920 #default 1360
      - SE_SCREEN_HEIGHT=1080 #default 1020
    ports:
      - "5902:5900"
      - "7902:7900"

  firefox-intel:
    image: selenium/node-firefox
    shm_size: 2gb
    depends_on:
      - selenium-hub-intel
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub-intel
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_GRID_URL=http://selenium-hub-intel:4444
      - SE_VNC_PASSWORD=$SE_VNC_PASSWORD
      - SE_SCREEN_WIDTH=1920 #default 1360
      - SE_SCREEN_HEIGHT=1080 #default 1020
    ports:
      - "5903:5900"
      - "7903:7900"

  runner:
    container_name: runner
    image: runner
    depends_on:
      selenium-hub-intel:
        condition: service_started
      chrome-intel:
        condition: service_started
      edge-intel:
        condition: service_started
      firefox-intel:
        condition: service_started
      build-cache:
        condition: service_started
    build:
      context: .
      dockerfile: ./Dockerfile
    secrets:
      - testFile
    volumes:
      - runner_testResultData:/test/testResultData
      - ./testResultData:/test/testResultData
      - build-cache_data:/test/build-cache

  selenium-hub-intel:
    image: selenium/hub
    container_name: selenium-hub-intel
    volumes:
      - /dev/shm:/dev/shm
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
#    networks:
#      - selenium-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  build-cache:
    image: gradle/build-cache-node:16.1
    container_name: build-cache
    restart: unless-stopped
    volumes:
      - ./build-cache:/data

    ports:
      - "8071:5071"
volumes:
  runner_testResultData: null
  build-cache_data: null

secrets:
  testFile:
    file: ./secrets.env