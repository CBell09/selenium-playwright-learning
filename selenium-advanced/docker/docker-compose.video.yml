# To execute this docker-compose yml file use `docker-compose -f docker-compose-v3-video.yml up`
# Add the `-d` flag at the end for detached execution
# To stop the execution, hit Ctrl+C, and then `docker-compose -f docker-compose-v3-video.yml down`
version: "3.9"

#networks:
#  selenium-network:
#    name: selenium-network
#    attachable: true
#    ipam:
#      driver: default
#      config:
#        - subnet: 172.28.0.0/16
#          ip_range: 172.28.5.0/24
#          gateway: 172.28.0.1

services:
  chrome-intel:
    image: selenium/node-chrome
    env_file:
      - .env
    shm_size: 2gb
    depends_on:
      - selenium-hub-intel
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub-intel
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

  edge-intel:
    image: selenium/node-edge
    shm_size: 2gb
    depends_on:
      - selenium-hub-intel
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub-intel
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

  firefox-intel:
    image: selenium/node-firefox
    shm_size: 2gb
    depends_on:
      - selenium-hub-intel
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub-intel
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

  chrome_video-intel:
    image: selenium/video:ffmpeg-4.3.1-20230801
    volumes:
      - /tmp/videos:/videos
    depends_on:
      - chrome-intel
    environment:
      - DISPLAY_CONTAINER_NAME=chrome-intel
      - FILE_NAME=chrome_video.mp4

  edge_video-intel:
    image: selenium/video:ffmpeg-4.3.1-20230801
    volumes:
      - /tmp/videos:/videos
    depends_on:
      - edge-intel
    environment:
      - DISPLAY_CONTAINER_NAME=edge-intel
      - FILE_NAME=edge_video.mp4

  firefox_video-intel:
    image: selenium/video:ffmpeg-4.3.1-20230801
    volumes:
      - /tmp/videos:/videos
    depends_on:
      - firefox-intel
    environment:
      - DISPLAY_CONTAINER_NAME=firefox-intel
      - FILE_NAME=firefox_video.mp4

  selenium-hub-intel:
    image: selenium/hub
    container_name: selenium-hub-intel
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"
    extra_hosts:
      - "host.docker.internal:host-gateway"